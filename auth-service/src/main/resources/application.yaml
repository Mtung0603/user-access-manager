server:
  port: 8081

spring:
  application:
    name: auth-service

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/user_access_db
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # Cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

# JWT
jwt:
  secret: your-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000 # 24h

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html