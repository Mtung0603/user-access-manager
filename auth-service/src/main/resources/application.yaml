server:
  port: 8081

spring:
  application:
    name: auth-service


  datasource:
    url: jdbc:postgresql://localhost:5432/user_access_db
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


  data:
    redis:
      host: localhost
      port: 6379


  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s


jwt:
  secret: r2sSupersecretkeyMustBeAtLeast256BitsLong1234
  expiration: 86400000



